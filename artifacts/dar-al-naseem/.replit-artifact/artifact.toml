kind = "web"
previewPath = "/"
title = "Dar Al Naseem"
version = "1.0.0"
id = "artifacts/dar-al-naseem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26054

[services.development]
run = "pnpm --filter @workspace/dar-al-naseem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dar-al-naseem", "run", "build" ]
publicDir = "artifacts/dar-al-naseem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26054"
BASE_PATH = "/"
